<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScriptTest</title>
    <!-- CSS файл -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Видео на заднем фоне -->
    <video autoplay muted loop id="background-video">
        <source src="video/background.mp4" type="video/mp4">
    </video>
    
    <div class="container">
        <h1>Знакомство с JavaScript</h1>
        
        <!-- удвоение числа -->
        <input type="num" 
               id="numInput" 
               class="input-field" 
               placeholder="Введите число...">
        
        <button class="button" onclick="doubleNumber()">Удвоить число</button>
        <button class="button" onclick="checkEven()">Проверить четность</button>

        <!-- подсказка -->
        <div class="hint">
            💡 Результат действий можно увидеть в консоли (F12)
        </div>
        
        <hr>

        <!-- приветствие -->
        <button class="button" onclick="greet()">Ввести имя</button>

        <!-- список чисел) -->
        <div class="numbers-list">
            <h3>Массив чисел от 1 до 5:</h3>
            <ul id="numberList"></ul>
        </div>

        <!-- картинка -->
        <div class="image-container">
            <img src="images/image1.jpg" 
                 alt="Приветствие" 
                 class="greeting-image"
                 onclick="playMeow()">     <!-- ))) -->
        </div>
    </div>

    <!-- js -->
    <script src="script.js"></script>
</body>
</html>
